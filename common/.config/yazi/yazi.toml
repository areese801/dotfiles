[mgr]
show_hidden = true
sort_by = "mtime"
sort_reverse = true
sort_dir_first = true
linemode = "mtime"

[preview]
tab_size   = 2
max_width  = 600
max_height = 900
cache_dir  = ""

# Image preview settings optimized for Neovim integration
image_delay   = 30
image_filter  = "triangle"
image_quality = 75

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]
open = [
    { run = 'open "$@"', desc = "Open with system default application" },
]
