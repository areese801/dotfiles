# ~/.tmux.conf

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Multiple prefix keys
set-option -g prefix C-\\
bind-key C-\\ send-prefix
set-option -g prefix2 C-b
bind-key C-b send-prefix -2

# Mouse and clipboard fixes
set-option -g mouse on
set-window-option -g mode-keys vi
set-option -g set-clipboard on

# Window and pane numbering from 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Window management
# allow-rename off: keeps your custom window names (e.g. "backend", "frontend")
# allow-rename on: shows running commands (e.g. "vim", "npm run dev") - dynamic but overwrites custom names
set-option -g allow-rename off
set-option -g renumber-windows on

# Split panes using | and - / Open panes in current dir
bind-key - split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"

# Critical copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Pane border styling - make active pane obvious
set-option -g pane-border-style fg=color240              # Inactive panes: dark gray
set-option -g pane-active-border-style fg=#A7C080,bg=#2d3a2e   # Active pane: bright green with subtle dark green bg

# Status bar styling
set-option -g focus-events on
set-option -g status-style bg=default
set-option -g status-left-length 90
set-option -g status-right-length 90
set-option -g status-justify centre
set-option -g status on
set-option -g status-interval 1
set-option -g window-status-current-format "#[bg=#A7C080,fg=black] #I:#W #[default]"
set-option -g window-status-format "#[bg=black,fg=#A7C080] #I:#W #[default]"

# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Show project directory name in pane border (Everforest green, bold)
set-option -g pane-border-status top
set-option -g pane-border-format '#[bold,fg=#A7C080] #{b:pane_current_path} '

# Enable passthrough for Ghostty features
set-option -gq allow-passthrough on
